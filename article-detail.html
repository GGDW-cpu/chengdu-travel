            padding: 0;
            box-sizing: border-box;
        }

            background-clip: text;

            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 32px;
        }

            color: var(--text-secondary);

            font-weight: 400;

        }

        }

        .nav-links a.active {
            color: var(--primary-color);
            font-weight: 600;
        }

            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.25s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            font-family: inherit;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--primary-color);
            color: var(--primary-color);
        }

        .btn-outline:hover {
            background: rgba(76, 175, 80, 0.08);
        }

        .btn-fill {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);

            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .btn-fill:hover {
            transform: translateY(-1px);

        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            padding: 14px 24px;
            border-radius: var(--radius-md);
            background: rgba(76, 175, 80, 0.08);
            transition: all 0.3s ease;
            margin-bottom: 32px;
            border: 1px solid transparent;

        .back-btn:hover {
            background: rgba(76, 175, 80, 0.15);

            border-color: rgba(76, 175, 80, 0.2);
        }

        }

            left: 0;
            top: 8px;
            width: 20px;
            height: 20px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;

            color: var(--text-primary);
            line-height: 1.8;
        }

            border-left: 4px solid var(--text-muted);

            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 12px;

            align-items: center;
            gap: 8px;
        }

            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.7;
            font-style: italic;

            padding: 100px 24px;
            max-width: 550px;
            margin: 100px auto;
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);

            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        .not-found h2 {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .not-found p {
            font-size: 1.05rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .footer {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--border-color);
            margin-top: 60px;
            background: rgba(255, 255, 255, 0.5);
        }

        .footer a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.25s ease;
        }

        .footer a:hover {
            color: var(--primary-dark);
        }

            .container {
                padding: 0 16px;
                height: 64px;
            }

                font-size: 1.2rem;
            }

            .nav-links {
                display: none;
            }

            .btn {
                padding: 8px 14px;
                font-size: 0.85rem;
            }

            .article-container {
                margin-top: 80px;
                padding: 0 16px;
            }

            .back-btn {
                padding: 12px 20px;
                font-size: 0.9rem;
            }

            .article-title {
                font-size: 1.7rem;
                line-height: 1.3;
            }

            .article-cover-wrapper {
                border-radius: var(--radius-lg);
            }

            .article-cover {
                height: 260px;
            }

            .article-content {
                padding: 28px 24px;
                border-radius: var(--radius-lg);
            }

            .article-text {
                font-size: 1rem;
            }

            .article-text p {
                margin-bottom: 20px;
            }

            .knowledge-section,
            .extra-section,
            .source-section {
                padding: 20px;
            }

            .knowledge-section h3,

                font-size: 1.1rem;
            }

                padding-left: 28px;
                font-size: 0.95rem;
            }
        }

                content: `蜀锦是中国四大名锦之一，因产于四川（古称“蜀”）而得名。蜀锦以图案精美、色彩艳丽、质地坚韧著称，已有2000多年历史。

蜀锦采用独特的“通经断纬”织法，可实现复杂图案的一次成型。这种织法比一般织锦更费工时，但图案更加精细立体。蜀锦的纹样多取材于自然，如熊猫、芙蓉、龙凤等，富有浓郁的地方特色。

川剧变脸的手法大体上分为三种：“抹脸”、“吹脸”、“扯脸”。“抹脸”是将油彩涂在脸上某部位，用手一抹即可变脸；“吹脸”适用于金粉、墨粉等粉末状化妆品；“扯脸”最为复杂，将脸谱画在绸子上剪好，系上丝线贴在脸上，表演时一张张扯下。

        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function renderArticle(article) {
            const container = document.getElementById('articleContainer');
            
            container.innerHTML = `
                <a href="articles.html" class="back-btn">
                    <span>←</span>
                    <span>返回列表</span>
                </a>
                
                <article class="article-header">
                    <div class="article-meta">
                        <span class="article-tag ${article.typeClass}">${article.type}</span>
                        <span class="article-date">${article.date}</span>
                    </div>
                    <h1 class="article-title">${article.title}</h1>
                </article>
                
                <div class="article-cover-wrapper">
                    <img src="${article.image}" alt="${article.title}" class="article-cover"
                         onerror="this.src='https://picsum.photos/850/420?random=${article.id}'">
                    <div class="cover-overlay"></div>
                </div>
                
                <div class="article-content">
                    <div class="article-text">
                        ${article.content.split('\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('')}
                    </div>
                    
                    <div class="knowledge-section">
                        <h3>📌 知识点</h3>
                        <ul>
                            ${article.knowledgePoints.map(point => `<li>${point}</li>`).join('')}
                        </ul>
                    </div>
                    
                    <div class="extra-section">
                        <h3>${article.extra.title}</h3>
                        <p>${article.extra.content}</p>
                    </div>
                    
                    <div class="source-section">
                        <h3>📖 引用来源</h3>
                        <p>${article.source}</p>
                    </div>
                </div>
            `;
        }

        function updateAuthUI() {
            const authButtons = document.getElementById('authButtons');
            try {
                const user = JSON.parse(localStorage.getItem('currentUser'));
                if (user) {
                    authButtons.innerHTML = `
                        <span style="color: var(--text-primary); margin-right: 1rem; font-weight: 500;">${user.nickname}</span>
                        ${user.isAdmin ? '<a href="admin.html" class="btn btn-outline" style="margin-right: 0.5rem;">管理后台</a>' : ''}
                        <button class="btn btn-fill" onclick="logout()">退出</button>
                    `;
                }
            } catch (e) {}
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.reload();
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateAuthUI();
            
            const articleId = getUrlParam('id');
            if (!articleId) {
                return;
            }
            
            const article = articlesData[articleId];
            if (article) {
                renderArticle(article);
            }
        });
    </script>
